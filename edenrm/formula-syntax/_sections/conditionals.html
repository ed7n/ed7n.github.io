<div>
  <code>&lt;condition&gt; ? &lt;expr. if true&gt; : &lt;expr. if false&gt;</code
>
</div>
<div>
  <p>This will evaluate condition as being either true or false. If it is true,
the expression to the left of the colon (:) is evaluated. If it is false, the
expression to the right is evaluated.</p>
</div>
