{% unless definedCssHeaderFooter %}
  <link rel="stylesheet" href="/res/styles/header-footer.css" />
  {% assign definedCssHeaderFooter = true %}
{% endunless %}
{% if page.head.title %}
  <header>
    <h1>{{ page.body.title }}</h1>
    {% if page.body.subtitle %}
      <span class="subtitle">{{ page.body.subtitle }}</span>
    {% endif %}
  </header>
{% else %} {% include banner.html %} {% endif %}
<hr />
