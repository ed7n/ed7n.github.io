{% for entry in site.data[include.key].menu %}
  {% assign slice = entry.label | slice: 0 %}
  {% if slice == "^" %} {% continue %} {% endif %}
  <li><span>[<a href="/{{ site.data[include.key].path }}{{ entry.href }}">{{ entry.label }}</a>]</span>{% if entry.subtitle != "" %}<span>{{ entry.subtitle }}</span>{% endif %}</li>
{% endfor %}
