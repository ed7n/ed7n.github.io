<p>The jump menu allows navigating to the top page of the website (<span class=
"smaller">[<a class="up" href="/">Home</a>]</span>), jumping to the top of a
page (<span class="smaller">[<a href="#top">Top</a>]</span>), and navigating to
the next item in your browser's navigation history (<span class="smaller">[<a
onclick="window.history.forward()">Forward</a>]</span>, because many mobile
browsers lack a forward button).</p>
<p>The jump menu can be found at the bottom of a page.</p>
